<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chain — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#070910; --surface:#0f1117; --panel:#13161f; --border:#1e2230; --border2:#2a2f42;
  --text:#e8eaf0; --muted:#5a607a; --muted2:#7b829e;
  --tile-bg:#141720; --tile-bdr:#1e2230; --surface2:#1e2230;
  --green:#48bb78; --red:#fc8181;
  --accent:#48bb78;
  --gold:#f5a623; --gold-bg:rgba(245,166,35,0.18); --gold-bdr:#f5a623;
}

html { background:var(--bg); overscroll-behavior:none; }
body {
  overscroll-behavior:none; background:var(--bg); color:var(--text);
  font-family:'Syne',sans-serif; min-height:100vh;
  display:flex; justify-content:center;
  background-image:radial-gradient(ellipse 70% 30% at 30% 0%, rgba(72,187,120,0.03) 0%, transparent 60%);
}

/* ── Layout ── */
.layout {
  width:100%; max-width:960px;
  display:grid; grid-template-columns:272px 1fr;
  gap:20px; padding:24px 16px 48px; align-items:start;
}

/* ── Left column ── */
.left { display:flex; flex-direction:column; gap:10px; position:sticky; top:24px; }

.game-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:2px; }
.game-title { font-size:22px; font-weight:800; letter-spacing:-0.5px; }
.game-title em { color:var(--gold); font-style:normal; }
.pf-tag {
  display:flex; align-items:center; gap:5px;
  font-family:'DM Mono',monospace; font-size:10px; color:var(--muted2);
  border:1px solid var(--border); border-radius:20px; padding:4px 9px;
}
.pf-dot { width:5px; height:5px; border-radius:50%; background:var(--gold); box-shadow:0 0 5px rgba(245,166,35,0.6); }

.panel-box { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px 16px; }
.panel-label { font-family:'DM Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:8px; }

/* Balance */
.bal-row { display:flex; justify-content:space-between; align-items:center; }
.bal-lbl { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); }
.bal-val { font-family:'DM Mono',monospace; font-size:15px; font-weight:500; }

/* Bet input */
.bet-row { display:flex; align-items:center; gap:6px; }
.bet-adj {
  width:34px; height:38px; border-radius:8px; border:1px solid var(--border2);
  background:var(--panel); color:var(--muted2); font-family:'DM Mono',monospace;
  font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all .12s; flex-shrink:0;
}
.bet-adj:hover { color:var(--text); background:var(--border); }
.bet-field {
  flex:1; background:var(--panel); border:1px solid var(--border2); border-radius:8px;
  padding:0 10px; height:38px; color:var(--text); font-family:'DM Mono',monospace;
  font-size:15px; font-weight:500; text-align:center; outline:none; transition:border-color .12s; width:100%;
}
.bet-field:focus { border-color:var(--green); }
.bet-field::-webkit-outer-spin-button, .bet-field::-webkit-inner-spin-button { -webkit-appearance:none; }
.bet-field[type=number] { -moz-appearance:textfield; }
.bet-presets { display:grid; grid-template-columns:repeat(4,1fr); gap:5px; margin-top:8px; }
.preset-btn {
  padding:5px 0; border-radius:7px; border:1px solid var(--border);
  background:var(--panel); color:var(--muted2); font-family:'DM Mono',monospace;
  font-size:11px; cursor:pointer; text-align:center; transition:all .12s;
}
.preset-btn:hover { border-color:var(--border2); color:var(--text); }

/* Bet button */
.btn-play {
  width:100%; height:50px; border-radius:12px; border:none;
  background:var(--gold); color:#070910; touch-action:manipulation;
  font-family:'Syne',sans-serif; font-size:16px; font-weight:800; cursor:pointer; letter-spacing:.02em;
  position:relative; overflow:hidden; transition:background .15s, transform .1s, box-shadow .15s, opacity .15s;
}
.btn-play::before { content:''; position:absolute; inset:0; background:linear-gradient(180deg,rgba(255,255,255,0.18) 0%,transparent 60%); }
.btn-play:hover:not(:disabled) { background:#f7b83a; box-shadow:0 4px 20px rgba(245,166,35,0.4); transform:translateY(-1px); }
.btn-play:active:not(:disabled) { transform:translateY(0); }
.btn-play:disabled { opacity:.35; cursor:not-allowed; }

/* History */
.hist-strip { display:flex; gap:5px; flex-wrap:wrap; min-height:22px; }
.hist-chip { padding:3px 8px; border-radius:5px; font-family:'DM Mono',monospace; font-size:11px; font-weight:500; }
.hist-chip.win  { background:rgba(245,166,35,0.14); color:var(--gold); }
.hist-chip.loss { background:rgba(255,255,255,0.04); color:var(--muted2); }
.hist-empty { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); }

/* ── Right column ── */
.right { display:flex; flex-direction:column; gap:12px; }

/* Result strip */
.result-strip {
  background:var(--surface); border:1px solid var(--border); border-radius:14px;
  padding:16px 20px; display:flex; align-items:center; justify-content:space-between;
}
.rs-left { display:flex; flex-direction:column; gap:2px; }
.rs-label { font-family:'DM Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); }
.rs-value { font-size:36px; font-weight:800; color:var(--muted2); letter-spacing:-1px; line-height:1; transition:color .2s; }
.rs-right { display:flex; flex-direction:column; align-items:flex-end; gap:10px; }
.rs-payout { text-align:right; }
.rs-payout-val { font-family:'DM Mono',monospace; font-size:15px; font-weight:600; color:var(--text); }
.rs-payout-sub { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); margin-top:1px; }

/* Turbo toggle */
.turbo-wrap { display:flex; align-items:center; gap:7px; cursor:pointer; user-select:none; }
.turbo-label { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted2); letter-spacing:.04em; }
.turbo-track {
  width:32px; height:18px; border-radius:9px; background:var(--border2);
  border:1px solid var(--border2); position:relative; transition:background .2s, border-color .2s; flex-shrink:0;
}
.turbo-track.on { background:var(--gold); border-color:var(--gold); }
.turbo-thumb { position:absolute; top:2px; left:2px; width:12px; height:12px; border-radius:50%; background:#fff; transition:transform .2s; }
.turbo-track.on .turbo-thumb { transform:translateX(14px); }

/* Arena — fixed height desktop, auto mobile; JS sets --die-size --op-w --op-font --item-h via inline style on arena */
.arena {
  background:var(--surface); border:1px solid var(--border); border-radius:18px;
  padding:20px;
  height:380px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
  position:relative; overflow:hidden;
  transition:box-shadow .35s, border-color .35s;
}
.arena.custom-open { overflow:visible; }
.arena.win  { box-shadow:0 0 32px rgba(72,187,120,0.3);  border-color:rgba(72,187,120,0.3); }
.arena.lose { box-shadow:0 0 28px rgba(252,129,129,0.25); border-color:rgba(252,129,129,0.2); }

.chain-wrap { display:flex; align-items:center; justify-content:center; }
.chain { display:flex; align-items:center; flex-wrap:nowrap; }

/* Result tag */
.result-tag {
  position:absolute; top:14px; right:18px;
  font-family:'DM Mono',monospace; font-size:13px; font-weight:600; letter-spacing:.05em;
  opacity:0; transition:opacity .25s; pointer-events:none;
}
.result-tag.show { opacity:1; }
.result-tag.win  { color:var(--green); }
.result-tag.lose { color:var(--red); }

/* Die — JS sets width/height via style attribute */
.die {
  width: var(--die-size, 72px); height: var(--die-size, 72px);
  border-radius: 14px; flex-shrink:0;
  background:var(--tile-bg); border:1.5px solid var(--tile-bdr);
  display:flex; align-items:center; justify-content:center;
  transition:border-color .2s, background .2s, box-shadow .2s;
}
.die.rolling { animation:spin .07s ease-in-out infinite; }
.die.win-die  { border-color:#68d391; border-width:3px; background:rgba(72,187,120,0.08); box-shadow:0 0 0 2px rgba(104,211,145,0.2),0 0 18px rgba(72,187,120,0.4); }
.die.lose-die { border-color:rgba(252,129,129,0.5); border-width:3px; background:rgba(252,129,129,0.05); box-shadow:0 0 14px rgba(252,129,129,0.2); }
@keyframes spin { 0%{transform:rotate(-4deg)scale(1.04)} 50%{transform:rotate(4deg)scale(0.96)} 100%{transform:rotate(-4deg)scale(1.04)} }
.die svg { width:70%; height:70%; display:block; }
.die-q { font-family:'DM Mono',monospace; font-weight:600; color:var(--muted); opacity:.4; font-size:inherit; }

/* Op slot — JS sets width/height via style */
.op-slot {
  width: var(--op-w, 48px); height: var(--die-size, 72px); flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  position:relative; overflow:visible;
}
.op-slot::before, .op-slot::after {
  content:''; position:absolute; top:50%; left:0; right:0; height:1px; background:var(--border);
}
.op-slot::before { transform:translateY(calc(var(--die-size,72px) * -0.28)); }
.op-slot::after  { transform:translateY(calc(var(--die-size,72px) *  0.28)); }
.op-slot.manual-slot::before, .op-slot.manual-slot::after { display:none; }
.op-glyph {
  font-family:'DM Mono',monospace; font-size:var(--op-font,32px); font-weight:600; color:var(--muted);
  background:var(--surface); padding:0 2px; z-index:1; line-height:1; display:block; transition:color .2s;
}
.op-glyph.win-op  { color:var(--green); }
.op-glyph.lose-op { color:var(--red); }

/* Custom inline picker — all sizes from JS vars */
.op-slot.manual-slot { cursor:default; }
.op-inline-picker {
  position:absolute; left:50%; transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center;
  width:var(--op-w, 48px);
}
.op-inline-picker.collapsing { pointer-events:none; }
.op-inline-item {
  width:100%; height:var(--item-h, 44px); border-radius:8px;
  font-family:'DM Mono',monospace; font-size:var(--op-font,32px); font-weight:600;
  color:var(--muted); cursor:pointer; text-align:center;
  display:flex; align-items:center; justify-content:center;
  position:relative; z-index:1; user-select:none; flex-shrink:0;
  transition:color .15s;
}
.op-inline-item:hover { color:var(--text); }
.op-inline-item.selected { color:var(--gold); }
.op-inline-highlight {
  position:absolute; left:0; right:0; height:var(--item-h,44px); border-radius:8px;
  background:var(--gold-bg); border:1px solid rgba(245,166,35,0.35);
  transition:top .15s cubic-bezier(.4,0,.2,1); pointer-events:none;
}

/* Slide-in */
@keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
.chain-enter { animation:slideIn .25s ease-out forwards; }

/* Config panel */
.config-panel {
  background:var(--surface); border:1px solid var(--border); border-radius:14px;
  padding:12px 14px; display:flex; align-items:center; gap:10px; flex-wrap:nowrap;
}
.cfg-label { font-family:'DM Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); white-space:nowrap; }
.cfg-divider { width:1px; height:24px; background:var(--border); flex-shrink:0; }

/* Dice count buttons */
.seg-btn {
  width:30px; height:30px; border-radius:7px;
  border:1px solid var(--border2); background:var(--panel);
  color:var(--muted2); font-family:'DM Mono',monospace;
  font-size:12px; font-weight:600; cursor:pointer;
  transition:all .12s; display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.seg-btn:hover { color:var(--text); border-color:var(--border2); background:var(--border); }
.seg-btn.active { background:var(--gold-bg); border-color:var(--gold-bdr); color:var(--gold); }

/* Op buttons */
.op-btn {
  height:30px; padding:0 8px; border-radius:7px;
  border:1px solid var(--border2); background:var(--panel);
  color:var(--muted2); font-family:'DM Mono',monospace;
  font-size:12px; font-weight:600; cursor:pointer; transition:all .12s;
  display:flex; align-items:center; justify-content:center; min-width:30px;
  flex-shrink:0;
}
.op-btn:hover { color:var(--text); background:var(--border); }
.op-btn.active { background:var(--gold-bg); border-color:var(--gold-bdr); color:var(--gold); }

/* Live stats */
.ls-header { display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; }
.ls-header-title { font-family:'DM Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); }
.ls-reset-btn {
  width:26px; height:26px; border-radius:6px; border:1px solid var(--border2);
  background:var(--panel); color:var(--muted2); cursor:pointer;
  display:flex; align-items:center; justify-content:center; font-size:13px;
  transition:color .12s, border-color .12s; flex-shrink:0; line-height:1;
}
.ls-reset-btn:hover { color:var(--text); border-color:var(--border2); background:var(--border); }
.ls-chevron {
  display:inline-block; width:8px; height:8px; margin-left:auto; flex-shrink:0;
  border-right:2px solid var(--muted2); border-bottom:2px solid var(--muted2);
  transform:rotate(45deg); transition:transform .2s;
}
.ls-chevron.open { transform:rotate(225deg); margin-top:3px; }
.ls-body { margin-top:10px; }
.live-stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.ls-item {
  background:var(--tile-bg); border:1px solid var(--tile-bdr);
  border-radius:10px; padding:10px 12px;
  display:flex; flex-direction:column; gap:4px;
}
.ls-label { font-family:'DM Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }
.ls-val { font-family:'DM Mono',monospace; font-size:17px; font-weight:600; color:var(--text); }
.ls-val.pos { color:var(--green); }
.ls-val.neg { color:var(--red); }
.ls-chart {
  margin-top:8px; background:var(--tile-bg); border:1px solid var(--tile-bdr);
  border-radius:10px; overflow:hidden;
}

/* Manual/Auto mode toggle */
.mode-toggle { display:flex; background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:3px; gap:0; }
.mode-btn {
  flex:1; height:34px; border-radius:8px; border:none; cursor:pointer;
  font-family:'Syne',sans-serif; font-size:13px; font-weight:700;
  transition:background .15s, color .15s, box-shadow .15s;
  background:transparent; color:var(--muted2);
}
.mode-btn.active { background:var(--surface2); color:var(--text); box-shadow:0 1px 4px rgba(0,0,0,0.4); }

/* Live stats grid */
.live-stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.ls-item { display:flex; flex-direction:column; gap:3px; }
.ls-label { font-family:'DM Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }
.ls-val { font-family:'DM Mono',monospace; font-size:14px; font-weight:600; color:var(--text); }
.ls-val.pos { color:var(--green); }
.ls-val.neg { color:var(--red); }

/* Mobile topbar (Bars-style) */
.mobile-topbar {
  display: none; /* shown only on mobile via media query */
  align-items: center; justify-content: space-between;
  padding: 2px 0;
}
.mobile-tab {
  display: flex; align-items: center; gap: 5px;
  background: none; border: none; cursor: pointer;
  font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
  color: var(--text); padding: 4px 0;
}
.mobile-tab .pt-chevron {
  display: inline-block; width: 7px; height: 7px;
  border-right: 2px solid var(--muted2); border-bottom: 2px solid var(--muted2);
  transform: rotate(45deg); transition: transform .2s; margin-bottom: 2px;
}
.mobile-tab.open .pt-chevron { transform: rotate(225deg); margin-bottom: -2px; }

/* Mobile: right-column items injected above bet panel */
.mobile-top { display:none; }

@media (max-width:680px) {
  .layout { grid-template-columns:1fr; }
  .left { position:static; }
  .right { display:none; }
  .mobile-top { display:flex; flex-direction:column; gap:10px; }
  .config-panel { flex-direction:column; align-items:stretch; gap:10px; }
  .cfg-row { display:flex; align-items:center; gap:8px; }
  .cfg-divider { display:none; }
  .cfg-row .seg-btn, .cfg-row .op-btn { flex:1; width:auto; }
  .arena { height:280px; padding:12px; }
  .arena:not(.custom-open) { overflow:hidden; }
  .arena.custom-open { overflow:visible; }
  .mobile-topbar { display:flex; }
  #historyBox { display:none; }
  #liveStatsBox { display:none; }
  .game-header    { order:1; }
  #box-balance    { order:2; }
  .mobile-top     { order:3; }
  .btn-play       { order:4; }
  .panel-box      { order:5; }
  #autoBetsWrap   { order:6; }
  #box-mode       { order:99; }
  /* Remove first-of-type rule */
}
</style>
</head>
<body>
<div class="layout">

  <!-- ── Left column ── -->
  <div class="left">
    <div class="game-header">
      <div class="game-title">Ch<em>ai</em>n</div>
      <div class="pf-tag"><div class="pf-dot"></div>Probably Fair</div>
    </div>

    <!-- Balance -->
    <div class="panel-box" id="box-balance">
      <div class="bal-row">
        <div class="bal-lbl">Balance</div>
        <div class="bal-val" id="balVal">$1,000.00</div>
      </div>
    </div>

    <!-- Manual / Auto toggle -->
    <div class="panel-box" id="box-mode" style="padding:4px;">
      <div class="mode-toggle">
        <button class="mode-btn active" id="modeManual">Manual</button>
        <button class="mode-btn" id="modeAuto">Auto</button>
      </div>
    </div>

    <!-- Mobile-only: result + arena + config above bet -->
    <div class="mobile-top">
      <!-- Result strip (mobile) — no turbo -->
      <div class="result-strip">
        <div class="rs-left">
          <div class="rs-label">Result</div>
          <div class="rs-value" id="multValM">—</div>
        </div>
        <div class="rs-right">
          <div class="rs-payout">
            <div class="rs-payout-val" id="payoutValM">$2.35 on win</div>
            <div class="rs-payout-sub" id="chanceValM">41.67% win chance</div>
          </div>
        </div>
      </div>
      <!-- Arena (mobile) -->
      <div class="arena" id="arenaM">
        <div class="result-tag" id="resultTagM"></div>
        <div class="chain-wrap"><div class="chain" id="chainM"></div></div>
      </div>
      <!-- Config (mobile) -->
      <div class="config-panel">
        <div class="cfg-row">
          <div class="cfg-label">Dice</div>
          <div style="display:flex;gap:5px;flex:1" id="countBtnsM">
            <button class="seg-btn active" data-n="2">2</button>
            <button class="seg-btn" data-n="3">3</button>
            <button class="seg-btn" data-n="4">4</button>
            <button class="seg-btn" data-n="5">5</button>
            <button class="seg-btn" data-n="6">6</button>
          </div>
        </div>
        <div class="cfg-row">
          <div class="cfg-label">Rule</div>
          <div style="display:flex;gap:5px;flex:1" id="opBtnsM">
            <button class="op-btn active" data-op="<">&lt;</button>
            <button class="op-btn" data-op="<=">≤</button>
            <button class="op-btn" data-op="=">=</button>
            <button class="op-btn" data-op=">=">≥</button>
            <button class="op-btn" data-op=">">&gt;</button>
            <button class="op-btn" data-op="custom">Custom</button>
          </div>
        </div>
      </div>
      <!-- Mobile: Bars-style topbar — Live Stats tab + Turbo -->
      <div class="mobile-topbar">
        <button class="mobile-tab" id="lsToggleM">
          <span>Live Stats</span>
          <span class="pt-chevron" id="lsChevronM"></span>
        </button>
        <div class="turbo-wrap" id="turboWrapM">
          <span style="font-size:12px;">⚡</span>
          <span class="turbo-label">Turbo</span>
          <div class="turbo-track" id="turboTrackM"><div class="turbo-thumb"></div></div>
        </div>
      </div>
      <!-- Live Stats panel (mobile, default collapsed) -->
      <div id="mobileStatsRow" style="display:none;">
        <div class="panel-box">
          <div class="ls-header" style="cursor:default;">
            <span class="ls-header-title">Live Stats</span>
            <button class="ls-reset-btn" onclick="resetLiveStats(event)" title="Reset">↺</button>
          </div>
          <div class="ls-body" id="lsBodyM">
            <div class="live-stats-grid">
              <div class="ls-item"><div class="ls-label">Profit</div><div class="ls-val" id="lsPnlM">—</div></div>
              <div class="ls-item"><div class="ls-label">Wins</div><div class="ls-val" id="lsWinsM">—</div></div>
              <div class="ls-item"><div class="ls-label">Wagered</div><div class="ls-val" id="lsWageredM">—</div></div>
              <div class="ls-item"><div class="ls-label">Losses</div><div class="ls-val" id="lsLossesM">—</div></div>
            </div>
            <div class="ls-chart" id="lsChartM"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bet Amount -->
    <div class="panel-box">
      <div class="panel-label">Bet Amount</div>
      <div class="bet-row">
        <button class="bet-adj" onclick="multBet(0.5)">1/2</button>

<script>
// ═══ TRUE RANDOM ═══
function trueRandDie() {
  const a = new Uint8Array(1);
  let v;
  do { crypto.getRandomValues(a); v = a[0]; } while (v >= 252);
  return (v % 6) + 1;
}
function randomHex(n) {
  const a = new Uint8Array(n);
  crypto.getRandomValues(a);
  return Array.from(a).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function sha256hex(s) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
}

// ═══ CHAIN MATH ═══
const _pc = {};
function chainProb(n, op) {
  const k = n + op;
  if (_pc[k] !== undefined) return _pc[k];
  const total = Math.pow(6, n);
  let wins = 0;
  const r = new Array(n).fill(1);
  function go(pos) {
    if (pos === n) {
      for (let i = 0; i < n - 1; i++) {
        const a = r[i], b = r[i+1];
        if (op === '<'  && a >= b) return;
        if (op === '<=' && a > b)  return;
        if (op === '>'  && a <= b) return;
        if (op === '>=' && a < b)  return;
        if (op === '='  && a !== b) return;
      }
      wins++; return;
    }
    for (let v = 1; v <= 6; v++) { r[pos] = v; go(pos+1); }
  }
  go(0);
  return (_pc[k] = wins / total);
}
function getMult(n, op) { return 0.98 / chainProb(n, op); }

// Manual mode: ops is array of length n-1
function manualChainProb(ops) {
  const n = ops.length + 1;
  const total = Math.pow(6, n);
  let wins = 0;
  const r = new Array(n).fill(1);
  function go(pos) {
    if (pos === n) {
      for (let i = 0; i < n - 1; i++) {
        const a = r[i], b = r[i+1], o = ops[i];
        if (o === '<'  && a >= b) return;
        if (o === '<=' && a > b)  return;
        if (o === '>'  && a <= b) return;
        if (o === '>=' && a < b)  return;
        if (o === '='  && a !== b) return;
      }
      wins++; return;
    }
    for (let v = 1; v <= 6; v++) { r[pos] = v; go(pos+1); }
  }
  go(0);
  return wins / total;
}

// ═══ PIPS ═══
const PIPS = {
  1:[[36,36]], 2:[[20,20],[52,52]], 3:[[20,20],[36,36],[52,52]],
  4:[[20,20],[52,20],[20,52],[52,52]], 5:[[20,20],[52,20],[36,36],[20,52],[52,52]],
  6:[[20,18],[52,18],[20,36],[52,36],[20,54],[52,54]],
};
function dieSVG(face, col) {
  const c = col || '#5a607a';
  return `<svg viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">${
    PIPS[face].map(([cx,cy]) => `<circle cx="${cx}" cy="${cy}" r="5" fill="${c}"/>`).join('')
  }</svg>`;
}

// ═══ STATE ═══
let diceCount = 2, op = '<';
let customMode = false;
let customOps = ['='];
let balance = 1000, nonce = 0, busy = false, turbo = false;
let serverSeed = randomHex(32), serverHash = '';
let historyData = [];

// Auto mode
let autoMode = false;
let autoRunning = false;
let autoRemaining = Infinity;

// Live stats
let lsRounds = 0, lsWins = 0, lsWagered = 0, lsPnl = 0;
sha256hex(serverSeed).then(h => serverHash = h);

// ═══ SIZE CALCULATION ═══
// Mobile: op-slot font/size fixed to 4-dice equivalent; die fills remaining width.
// Custom itemH bigger for touch. Picker always shows 2 above + selected + 2 below,
// centered on die midpoint via absolute positioning (overflow:visible on arena).
const ALL_OPS = ['<', '<=', '=', '>=', '>'];
const SYM_MAP = { '<':'<', '<=':`≤`, '=':'=', '>=':`≥`, '>':'>' };

function computeSizes(arenaEl) {
  const mobile = window.innerWidth <= 680;
  const padH = mobile ? 32 : 40;
  const avail = arenaEl.clientWidth - padH;
  const n = diceCount;
  const nOps = n - 1;

  let dieSize, opW, opFont, itemH;

  if (mobile) {
    // Op-slot fixed to 4-dice proportions regardless of actual dice count
    const refDie = Math.floor(avail / (4 + 3 * 0.5));
    const fixedOpW = Math.floor(refDie * 0.5);
    // Die size: fill proportionally but cap at 4-dice reference size
    dieSize = Math.min(Math.floor((avail - nOps * fixedOpW) / n), refDie);
    opW = fixedOpW;
    opFont = Math.floor(refDie * 0.52);
    itemH = Math.max(44, Math.floor(refDie * 0.6));
  } else {
    // Desktop: die fills width proportionally
    const opRatio = customMode ? 0.62 : 0.5;
    dieSize = Math.floor(avail / (n + nOps * opRatio));
    dieSize = Math.min(dieSize, customMode ? 82 : 90);
    opW = Math.floor(dieSize * opRatio);
    opFont = Math.floor(dieSize * (customMode ? 0.44 : 0.54));
    itemH = Math.max(40, Math.floor(dieSize * 0.5));
  }

  arenaEl.style.setProperty('--die-size', dieSize + 'px');
  arenaEl.style.setProperty('--op-w',     opW     + 'px');
  arenaEl.style.setProperty('--op-font',  opFont  + 'px');
  arenaEl.style.setProperty('--item-h',   itemH   + 'px');
  arenaEl.style.height = ''; // always driven by CSS

  return { dieSize, opW, opFont, itemH };
}

// ═══ BUILD CHAIN (both panels) ═══
function buildChainEl(chainEl, arenaEl, faces, state) {
  chainEl.innerHTML = '';
  const isCustomIdle = customMode && state === 'idle';

  let sizes = { dieSize:72, opW:44, opFont:32, itemH:44 };
  if (arenaEl) {
    sizes = computeSizes(arenaEl);
    let cls = 'arena';
    if (state === 'win') cls += ' win';
    else if (state === 'lose') cls += ' lose';
    if (isCustomIdle) cls += ' custom-open';
    arenaEl.className = cls;
  }
  const { dieSize, opW, opFont, itemH } = sizes;
  const col = state === 'win' ? '#68d391' : state === 'lose' ? '#fc8181' : '#5a607a';

  for (let i = 0; i < diceCount; i++) {
    const die = document.createElement('div');
    die.className = 'die' +
      (state === 'rolling' ? ' rolling' : '') +
      (state === 'win'  ? ' win-die'  : '') +
      (state === 'lose' ? ' lose-die' : '');
    die.innerHTML = faces ? dieSVG(faces[i], col)
      : `<div class="die-q" style="font-size:${Math.floor(dieSize*0.35)}px">?</div>`;
    chainEl.appendChild(die);

    if (i < diceCount - 1) {
      const slotOp = customMode ? customOps[i] : op;
      const slot = document.createElement('div');
      slot.className = 'op-slot' + (isCustomIdle ? ' manual-slot' : '');

      if (isCustomIdle) {
        // Picker: always show 2 above selected + selected + 2 below
        // Selected item always centered at die midpoint.
        // Items at fixed relative positions: [-2,-1,0,+1,+2] * itemH around center.
        const picker = document.createElement('div');
        picker.className = 'op-inline-picker';
        // Center of die = dieSize/2 from top of slot
        // Selected item center = dieSize/2
        // Picker top = dieSize/2 - 2.5*itemH  (2 above + half of selected)
        picker.style.top    = (dieSize / 2 - 2.5 * itemH) + 'px';
        picker.style.width  = opW + 'px';

        const selIdx = ALL_OPS.indexOf(slotOp);

        const highlight = document.createElement('div');
        highlight.className = 'op-inline-highlight';
        // highlight top relative to picker = selIdx * itemH
        highlight.style.top = (selIdx * itemH) + 'px';
        picker.appendChild(highlight);

        const slotIdxCopy = i;
        ALL_OPS.forEach((o, idx) => {
          const item = document.createElement('div');
          item.className = 'op-inline-item' + (o === slotOp ? ' selected' : '');
          item.textContent = SYM_MAP[o];
          item.addEventListener('click', e => {
            e.stopPropagation();
            if (customOps[slotIdxCopy] === o) return;
            customOps[slotIdxCopy] = o;
            // Move highlight
            highlight.style.top = (idx * itemH) + 'px';
            picker.querySelectorAll('.op-inline-item').forEach((el, i2) => {
              el.classList.toggle('selected', i2 === idx);
            });
            picker.classList.add('collapsing');
            setTimeout(() => { buildChain(null, 'idle'); updateDisplay(); }, 320);
          });
          picker.appendChild(item);
        });
        slot.appendChild(picker);
      } else {
        const g = document.createElement('div');
        g.className = 'op-glyph' + (state === 'win' ? ' win-op' : state === 'lose' ? ' lose-op' : '');
        g.textContent = SYM_MAP[slotOp];
        slot.appendChild(g);
      }
      chainEl.appendChild(slot);
    }
  }
}

function buildChain(faces, state) {
  buildChainEl(document.getElementById('chain'), document.getElementById('arena'), faces, state);
  buildChainEl(document.getElementById('chainM'), document.getElementById('arenaM'), faces, state);
}

// ═══ ROLL ═══
async function doBet(onComplete) {
  if (busy) return;
  const bet = parseFloat(document.getElementById('betInput').value);
  if (!bet || bet <= 0 || bet > balance) { shakeArena(); if (onComplete) onComplete(false); return; }

  busy = true;
  if (!autoRunning) document.getElementById('betBtn').disabled = true;
  hideResult(); nonce++;
  const clientSeed = randomHex(16);

  if (!turbo) {
    buildChain(null, 'idle');
    for (let f = 0; f < 14; f++) {
      await delay(65);
      buildChain(Array.from({length: diceCount}, trueRandDie), 'rolling');
    }
    await delay(80);
  }

  const faces = Array.from({length: diceCount}, trueRandDie);
  let won = true;
  for (let i = 0; i < diceCount - 1; i++) {
    const a = faces[i], b = faces[i+1];
    const o = customMode ? customOps[i] : op;
    if (o === '<'  && a >= b) { won = false; break; }
    if (o === '<=' && a > b)  { won = false; break; }
    if (o === '>'  && a <= b) { won = false; break; }
    if (o === '>=' && a < b)  { won = false; break; }
    if (o === '='  && a !== b) { won = false; break; }
  }

  const mult = customMode ? 0.98 / manualChainProb(customOps) : getMult(diceCount, op);
  const payout = won ? +(bet * mult).toFixed(2) : 0;
  const profit = +(payout - bet).toFixed(2);
  balance = +(balance + profit).toFixed(2);

  // Live stats
  lsRounds++; lsWagered = +(lsWagered + bet).toFixed(2);
  lsPnl = +(lsPnl + profit).toFixed(2);
  if (won) lsWins++;
  lsPnlHistory.push(lsPnl);

  buildChain(faces, won ? 'win' : 'lose');

  ['multVal','multValM'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = won ? mult.toFixed(2) + '×' : '0×';
    el.style.color = won ? 'var(--green)' : 'var(--red)';
  });

  showResult(won, profit);
  addHistory(won ? mult : 0);
  updateBal();
  updateLiveStats();
  serverSeed = randomHex(32);
  sha256hex(serverSeed).then(h => serverHash = h);

  const cooldown = turbo ? 0 : 600;
  setTimeout(() => {
    busy = false;
    if (!autoRunning) document.getElementById('betBtn').disabled = false;
    if (onComplete) onComplete(true);
  }, cooldown);
}

// ═══ UI HELPERS ═══
function showResult(won, profit) {
  ['resultTag','resultTagM'].forEach(id => {
    const tag = document.getElementById(id);
    if (!tag) return;
    tag.className = 'result-tag show ' + (won ? 'win' : 'lose');
    tag.textContent = won ? '+$' + profit.toFixed(2) : '−$' + Math.abs(profit).toFixed(2);
    setTimeout(() => tag.className = 'result-tag ' + (won ? 'win' : 'lose'), 2200);
  });
}
function hideResult() {
  ['resultTag','resultTagM'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.className = 'result-tag';
  });
}
function shakeArena() {
  ['arena','arenaM'].forEach(id => {
    const a = document.getElementById(id);
    if (!a) return;
    a.style.transform = 'translateX(-6px)';
    setTimeout(() => a.style.transform = 'translateX(6px)', 80);
    setTimeout(() => a.style.transform = '', 160);
  });
}
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function updateBal() {
  document.getElementById('balVal').textContent =
    '$' + balance.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function addHistory(mult) {
  historyData.unshift(mult > 0 ? mult.toFixed(2) : 0);
  if (historyData.length > 20) historyData.pop();
  const strip = document.getElementById('histStrip');
  if (!historyData.length) { strip.innerHTML = '<span class="hist-empty">No rounds played yet</span>'; return; }
  strip.innerHTML = historyData.map(m =>
    `<span class="hist-chip ${+m > 0 ? 'win' : 'loss'}">${+m > 0 ? m+'×' : '0×'}</span>`
  ).join('');
}

function updateDisplay() {
  const bet = parseFloat(document.getElementById('betInput').value) || 0;
  let p, m;
  if (customMode) {
    p = manualChainProb(customOps);
    m = p > 0 ? 0.98 / p : 0;
  } else {
    p = chainProb(diceCount, op);
    m = getMult(diceCount, op);
  }
  const payoutStr = '$' + (bet * m).toFixed(2) + ' on win';
  const chanceStr = (p * 100).toFixed(2) + '% win chance';
  ['payoutVal','payoutValM'].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = payoutStr; });
  ['chanceVal','chanceValM'].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = chanceStr; });
}

function setBet(v) { document.getElementById('betInput').value = v.toFixed(2); updateDisplay(); }
function multBet(m) {
  const cur = parseFloat(document.getElementById('betInput').value) || 1;
  document.getElementById('betInput').value = Math.max(0.01, +(cur * m).toFixed(2));
  updateDisplay();
}

let lsOpen = true;
let lsPnlHistory = [];

function resetLiveStats(e) {
  if (e) e.stopPropagation();
  lsRounds = 0; lsWins = 0; lsWagered = 0; lsPnl = 0; lsPnlHistory = [];
  updateLiveStats();
}

function makePnlSparkline(history) {
  if (history.length < 2) return '';
  const W = 220, H = 60, padX = 0, padY = 6;
  const min = Math.min(0, ...history);
  const max = Math.max(0, ...history);
  const range = max - min || 1;
  const sx = i => padX + (W - 2*padX) * i / (history.length - 1);
  const sy = v => padY + (H - 2*padY) * (1 - (v - min) / range);
  const zero = sy(0);
  const lastVal = history[history.length - 1];
  const col = lastVal >= 0 ? '#48bb78' : '#fc8181';
  const fillCol = lastVal >= 0 ? 'rgba(72,187,120,0.18)' : 'rgba(252,129,129,0.14)';
  const pts = history.map((v, i) => [sx(i), sy(v)]);
  let d = `M ${pts[0][0]},${pts[0][1]}`;
  for (let i = 1; i < pts.length; i++) {
    const cp1x = (pts[i-1][0] + pts[i][0]) / 2;
    d += ` C ${cp1x},${pts[i-1][1]} ${cp1x},${pts[i][1]} ${pts[i][0]},${pts[i][1]}`;
  }
  const fillD = d + ` L ${pts[pts.length-1][0]},${zero} L ${pts[0][0]},${zero} Z`;
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:60px;display:block;">
    <line x1="${padX}" y1="${zero}" x2="${W-padX}" y2="${zero}" stroke="var(--border2)" stroke-width="1"/>
    <path d="${fillD}" fill="${fillCol}"/>
    <path d="${d}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function updateLiveStats() {
  const losses = lsRounds - lsWins;
  const pnlStr = lsRounds > 0 ? (lsPnl >= 0 ? '+' : '-') + '$' + Math.abs(lsPnl).toFixed(2) : '—';
  const pnlCls = 'ls-val' + (lsPnl > 0 ? ' pos' : lsPnl < 0 ? ' neg' : '');
  const wagStr = lsRounds > 0 ? '$' + lsWagered.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}) : '—';
  const winsStr = lsRounds > 0 ? String(lsWins) : '—';
  const lossStr = lsRounds > 0 ? String(losses) : '—';
  const chart = lsRounds > 1 ? makePnlSparkline(lsPnlHistory) : '';

  function set(sfx) {
    const g = id => document.getElementById(id + sfx);
    if (g('lsPnl'))    { g('lsPnl').textContent = pnlStr; g('lsPnl').className = pnlCls; }
    if (g('lsWins'))    g('lsWins').textContent   = winsStr;
    if (g('lsWagered')) g('lsWagered').textContent = wagStr;
    if (g('lsLosses'))  g('lsLosses').textContent  = lossStr;
    if (g('lsChart'))   g('lsChart').innerHTML     = chart;
  }
  set(''); set('M');
}

// Accordion toggles
document.getElementById('lsToggle').addEventListener('click', () => {
  lsOpen = !lsOpen;
  document.getElementById('lsBody').style.display = lsOpen ? '' : 'none';
  document.getElementById('lsChevron').classList.toggle('open', lsOpen);
});
document.getElementById('lsToggleM')?.addEventListener('click', () => {
  const panel = document.getElementById('mobileStatsRow');
  const tab = document.getElementById('lsToggleM');
  const nowOpen = panel.style.display === 'none';
  panel.style.display = nowOpen ? '' : 'none';
  tab.classList.toggle('open', nowOpen);
});
// ═══ MANUAL / AUTO ENGINE ═══
function isInfBets() { const v = document.getElementById('betsEl').value.trim(); return v === '∞' || v === ''; }
function getAutoCount() { return isInfBets() ? Infinity : Math.max(1, parseInt(document.getElementById('betsEl').value) || 1); }

function setAutoBtn(state) {
  const btn = document.getElementById('betBtn');
  if (state === 'running') {
    btn.textContent = 'Stop';
    btn.style.background = '#e53e3e';
    btn.style.boxShadow = '0 4px 20px rgba(229,62,62,0.35)';
    btn.disabled = false;
  } else {
    btn.textContent = state === 'start' ? 'Start' : 'Resume';
    btn.style.background = '';
    btn.style.boxShadow = '';
    btn.disabled = false;
  }
}

function stopAuto(exhausted) {
  autoRunning = false;
  if (exhausted) {
    autoRemaining = Infinity;
    document.getElementById('betsEl').value = '∞';
    setAutoBtn('start');
  } else {
    setAutoBtn('resume');
  }
}

function runAutoLoop() {
  if (!autoRunning) return;
  const bet = parseFloat(document.getElementById('betInput').value) || 0;
  if (bet > balance) { stopAuto(false); return; }
  if (autoRemaining <= 0) { stopAuto(true); return; }
  if (autoRemaining !== Infinity) {
    autoRemaining--;
    document.getElementById('betsEl').value = autoRemaining || '∞';
  }
  doBet(() => { if (autoRunning) runAutoLoop(); });
}

document.getElementById('modeManual').addEventListener('click', () => {
  if (autoRunning) stopAuto(false);
  autoMode = false;
  document.getElementById('modeManual').classList.add('active');
  document.getElementById('modeAuto').classList.remove('active');
  document.getElementById('autoBetsWrap').style.display = 'none';
  document.getElementById('betBtn').textContent = 'Bet';
  document.getElementById('betBtn').style.background = '';
  document.getElementById('betBtn').style.boxShadow = '';
});
document.getElementById('modeAuto').addEventListener('click', () => {
  autoMode = true;
  document.getElementById('modeAuto').classList.add('active');
  document.getElementById('modeManual').classList.remove('active');
  document.getElementById('autoBetsWrap').style.display = '';
  setAutoBtn('start');
});

document.getElementById('betsHalf').addEventListener('click', () => {
  if (autoRunning) return;
  const v = parseInt(document.getElementById('betsEl').value);
  document.getElementById('betsEl').value = (!isNaN(v) && v > 1) ? Math.max(1, Math.floor(v / 2)) : '∞';
});
document.getElementById('betsDouble').addEventListener('click', () => {
  if (autoRunning) return;
  const v = parseInt(document.getElementById('betsEl').value);
  document.getElementById('betsEl').value = !isNaN(v) ? Math.min(9999, v * 2) : 100;
});
document.querySelectorAll('[data-b]').forEach(b =>
  b.addEventListener('click', () => { if (!autoRunning) document.getElementById('betsEl').value = b.dataset.b; })
);

// Override betBtn for auto mode
document.getElementById('betBtn').onclick = () => {
  if (!autoMode) { doBet(); return; }
  if (autoRunning) { stopAuto(false); return; }
  // Start / Resume
  if (document.getElementById('betBtn').textContent === 'Start') {
    autoRemaining = getAutoCount();
    // Reset live stats on new auto run
    lsRounds = 0; lsWins = 0; lsWagered = 0; lsPnl = 0;
  }
  autoRunning = true;
  setAutoBtn('running');
  runAutoLoop();
};

// ═══ TURBO (both) ═══
function setTurbo(val) {
  turbo = val;
  ['turboTrack','turboTrackM'].forEach(id => document.getElementById(id)?.classList.toggle('on', turbo));
}
document.getElementById('turboWrap').addEventListener('click', () => setTurbo(!turbo));
document.getElementById('turboWrapM').addEventListener('click', () => setTurbo(!turbo));

// ═══ CONFIG LISTENERS (desktop + mobile synced) ═══
function onCountClick(e) {
  const btn = e.target.closest('.seg-btn');
  if (!btn || busy) return;
  diceCount = +btn.dataset.n;
  const needed = diceCount - 1;
  while (customOps.length < needed) customOps.push('=');
  customOps = customOps.slice(0, needed);
  document.querySelectorAll('.seg-btn').forEach(b => b.classList.toggle('active', b.dataset.n === btn.dataset.n));
  buildChain(null, 'idle');
  updateDisplay();
}
function onOpClick(e) {
  const btn = e.target.closest('.op-btn');
  if (!btn || busy) return;
  if (btn.dataset.op === 'custom') {
    customMode = true;
    const needed = diceCount - 1;
    while (customOps.length < needed) customOps.push('=');
    customOps = customOps.slice(0, needed);
  } else {
    customMode = false;
    op = btn.dataset.op;
  }
  document.querySelectorAll('.op-btn').forEach(b => b.classList.toggle('active', b.dataset.op === btn.dataset.op));
  buildChain(null, 'idle');
  updateDisplay();
}

document.getElementById('countBtns').addEventListener('click', onCountClick);
document.getElementById('opBtns').addEventListener('click', onOpClick);
document.getElementById('countBtnsM').addEventListener('click', onCountClick);
document.getElementById('opBtnsM').addEventListener('click', onOpClick);
document.getElementById('betInput').addEventListener('input', updateDisplay);

// ═══ INIT ═══
for (let n = 2; n <= 6; n++) ['<','<=','=','>=','>'].forEach(o => chainProb(n, o));
buildChain(null, 'idle');
updateDisplay();
updateBal();
updateLiveStats();
window.addEventListener('resize', () => buildChain(null, 'idle'));
</script>
