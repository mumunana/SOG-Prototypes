<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bars — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#070910; --surface:#0f1117; --panel:#13161f; --border:#1e2230; --border2:#2a2f42;
  --text:#e8eaf0; --muted:#5a607a; --muted2:#7b829e;
  --tile-bg:#141720; --tile-bdr:#1e2230; --surface2:#1e2230;

  /* selected — always visible */
  --sel-bg:rgba(99,179,237,0.10); --sel-bdr:#63b3ed;

  /* result overlays on player picks */
  --gold:#f5a623; --gold-bg:rgba(245,166,35,0.18); --gold-bdr:#f5a623; --gold-glow:rgba(245,166,35,0.5);
  --sil:#c0c8d8;  --sil-bg:rgba(192,200,216,0.14);  --sil-bdr:#a0aec0;  --sil-glow:rgba(160,174,192,0.3);
  --miss-bdr:rgba(252,129,129,0.2); --miss-bg:rgba(252,129,129,0.04);

  /* revealed not-selected */
  --rev-gold-bg:rgba(245,166,35,0.10); --rev-gold-bdr:rgba(245,166,35,0.55);
  --rev-sil-bg:rgba(160,174,192,0.08); --rev-sil-bdr:rgba(160,174,192,0.45);

  --green:#48bb78; --red:#fc8181; --accent:#f5a623;
}

html { background:var(--bg); overscroll-behavior:none; }
body { overscroll-behavior:none; background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; min-height:100vh; display:flex; justify-content:center;
  background-image:radial-gradient(ellipse 70% 30% at 30% 0%,rgba(245,166,35,0.04) 0%,transparent 60%); }

/* ── Layout: left controls | right board ── */
.layout { width:100%; max-width:960px; display:grid; grid-template-columns:272px 1fr; gap:20px; padding:24px 16px 48px; align-items:start; }

/* ── Left column ── */
.left { display:flex; flex-direction:column; gap:10px; position:sticky; top:24px; }

.game-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:2px; }
.game-title { font-size:22px; font-weight:800; letter-spacing:-0.5px; }
.game-title em { color:var(--gold); font-style:normal; }
.pf-tag { display:flex; align-items:center; gap:5px; font-family:'DM Mono',monospace; font-size:10px; color:var(--muted2);
  border:1px solid var(--border); border-radius:20px; padding:4px 9px; }
.pf-dot { width:5px; height:5px; border-radius:50%; background:var(--green); box-shadow:0 0 5px var(--green); }

.panel-box { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px 16px; }
.panel-label { font-family:'DM Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:8px; }

/* balance */
.bal-row { display:flex; justify-content:space-between; align-items:center; }
.bal-lbl { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); }
.bal-val { font-family:'DM Mono',monospace; font-size:15px; font-weight:500; }

/* bet */
.bet-row { display:flex; align-items:center; gap:6px; }
.bet-adj { width:34px; height:38px; border-radius:8px; border:1px solid var(--border2); background:var(--panel); color:var(--muted2);
  font-family:'DM Mono',monospace; font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .12s; flex-shrink:0; }
.bet-adj:hover { color:var(--text); background:var(--border); }
.bet-field { flex:1; background:var(--panel); border:1px solid var(--border2); border-radius:8px; padding:0 10px; height:38px;
  color:var(--text); font-family:'DM Mono',monospace; font-size:15px; font-weight:500; text-align:center; outline:none; transition:border-color .12s; width:100%; }
.bet-field:focus { border-color:var(--accent); }
.bet-presets { display:grid; grid-template-columns:repeat(4,1fr); gap:5px; margin-top:8px; }
.preset-btn { padding:5px 0; border-radius:7px; border:1px solid var(--border); background:var(--panel); color:var(--muted2);
  font-family:'DM Mono',monospace; font-size:11px; cursor:pointer; text-align:center; transition:all .12s; }
.preset-btn:hover { border-color:var(--border2); color:var(--text); }

/* bet button */
.btn-play { width:100%; height:50px; border-radius:12px; border:none; background:var(--gold); color:#0a0b0f; touch-action:manipulation;
  font-family:'Syne',sans-serif; font-size:16px; font-weight:800; cursor:pointer; letter-spacing:.02em;
  position:relative; overflow:hidden; transition:background .15s,transform .1s,box-shadow .15s,opacity .15s; }
.btn-play::before { content:''; position:absolute; inset:0; background:linear-gradient(180deg,rgba(255,255,255,0.18) 0%,transparent 60%); }
.btn-play:hover:not(:disabled) { background:#f7b83a; box-shadow:0 4px 20px rgba(245,166,35,0.4); transform:translateY(-1px); }
.btn-play:active:not(:disabled) { transform:translateY(0); }
.btn-play:disabled { opacity:.35; cursor:not-allowed; }
.btn-secondary { width:100%; height:50px; border-radius:12px; border:1px solid var(--border2);
  background:var(--panel); color:var(--muted2); font-family:'Syne',sans-serif; font-size:15px;
  font-weight:700; cursor:pointer; letter-spacing:.01em; transition:background .15s,color .15s,border-color .15s; }
.btn-secondary:hover { background:var(--border); color:var(--text); border-color:var(--border2); }

/* Manual/Auto toggle */
.mode-toggle { display:flex; background:var(--bg); border:1px solid var(--border); border-radius:12px; padding:3px; gap:0; }
.mode-btn {
  flex:1; height:36px; border-radius:9px; border:none; cursor:pointer;
  font-family:'Syne',sans-serif; font-size:14px; font-weight:700;
  transition:background .18s, color .18s, box-shadow .18s;
  background:transparent; color:var(--muted2);
}
.mode-btn.active {
  background:var(--surface2, #1e2230); color:var(--text);
  box-shadow:0 1px 4px rgba(0,0,0,0.4);
}

/* Number of bets — hidden by default */
#autoBetsWrap { display:none; }
#autoBetsWrap.show { display:block; }
.btn-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }

/* history */
.hist-strip { display:flex; gap:5px; flex-wrap:wrap; min-height:22px; }
.hist-chip { padding:3px 8px; border-radius:5px; font-family:'DM Mono',monospace; font-size:11px; font-weight:500; }
.hist-chip.win  { background:rgba(245,166,35,0.14); color:var(--gold); }
.hist-chip.loss { background:rgba(255,255,255,0.04); color:var(--muted2); }
.hist-empty { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); }

/* paytable inside left panel */
.pt-empty { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); line-height:1.5; }
.pt-row { padding:7px 0; display:grid; grid-template-columns:1fr auto auto; gap:8px;
  border-bottom:1px solid var(--border); align-items:center; }
.pt-row:last-child { border-bottom:none; }
.pt-row.hl  { }
.pt-hits { display:flex; align-items:center; gap:3px; font-family:'DM Mono',monospace; font-size:11px; color:var(--muted2); }
.pt-prob { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); text-align:right; min-width:42px; }
.pt-mult { font-family:'DM Mono',monospace; font-size:12px; font-weight:600; color:var(--gold); text-align:right; min-width:44px; }
.pt-mult.zero { color:var(--muted); font-weight:400; }
.pt-head-row { display:grid; grid-template-columns:1fr auto auto; gap:8px; margin-bottom:6px; }
.pt-head-row span { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
.pt-head-row span:not(:first-child) { text-align:right; }

/* ── Right column ── */
.right { display:flex; flex-direction:column; gap:12px; }

/* board top bar */
.board-topbar { display:flex; justify-content:space-between; align-items:center; }
.pick-counter { font-family:'DM Mono',monospace; font-size:12px; color:var(--muted2); }
.pick-counter strong { color:var(--sel-bdr); font-size:13px; }
.turbo-wrap { display:flex; align-items:center; gap:7px; cursor:pointer; user-select:none; }
.turbo-label { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted2); letter-spacing:0.04em; }
.turbo-track {
  width:32px; height:18px; border-radius:9px; background:var(--border2);
  border:1px solid var(--border2); position:relative;
  transition:background .2s, border-color .2s; flex-shrink:0;
}
.turbo-track.on { background:var(--gold); border-color:var(--gold); }
.turbo-thumb {
  position:absolute; top:2px; left:2px;
  width:12px; height:12px; border-radius:50%;
  background:#fff; transition:transform .2s;
}
.turbo-track.on .turbo-thumb { transform:translateX(14px); }

/* board grid */
.board { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; background:var(--surface);
  border:1px solid var(--border); border-radius:18px; padding:16px; }

/* ── Tile states ── */
.tile {
  aspect-ratio:1; border-radius:11px; border:1.5px solid var(--tile-bdr); background:var(--tile-bg);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; position:relative; overflow:hidden; user-select:none;
  transition:border-color .14s, background .14s, box-shadow .14s, opacity .14s;
}
.tile:hover:not(.locked) { border-color:var(--border2); background:#1c2030; }
.tile.selected:hover:not(.locked) { border-color:#90cdf4; background:rgba(99,179,237,0.18); }

/* 1. Selected (idle) — always blue, persists through reveal */
.tile.selected {
  border-color:var(--sel-bdr);
  background:var(--sel-bg);
  box-shadow:0 0 0 1px rgba(99,179,237,0.1) inset;
}

/* 2. Player hit GOLD — green thick stroke + glow */
.tile.selected.result-gold {
  border-color:#68d391;
  border-width:4px;
  background:rgba(72,187,120,0.10);
  box-shadow:0 0 0 3px rgba(104,211,145,0.3), 0 0 20px rgba(72,187,120,0.5), 0 0 40px rgba(72,187,120,0.2);
}

/* 3. Player hit SILVER — green thick stroke + glow */
.tile.selected.result-silver {
  border-color:#68d391;
  border-width:4px;
  background:rgba(72,187,120,0.08);
  box-shadow:0 0 0 3px rgba(104,211,145,0.25), 0 0 18px rgba(72,187,120,0.4), 0 0 36px rgba(72,187,120,0.15);
}

/* 4. Player MISS — keeps full blue selection highlight, just shows ✕ */
.tile.selected.result-miss {
  border-color:var(--sel-bdr);
  background:var(--sel-bg);
  color:rgba(99,179,237,0.45);
  box-shadow:0 0 0 1px rgba(99,179,237,0.1) inset;
  opacity:1;
}

/* 5. Not selected, gold revealed — very dim */
.tile.rev-gold {
  border-color:var(--rev-gold-bdr);
  background:var(--rev-gold-bg);
  opacity:.45;
}

/* 6. Not selected, silver revealed — very dim */
.tile.rev-silver {
  border-color:var(--rev-sil-bdr);
  background:var(--rev-sil-bg);
  opacity:.4;
}

/* 7. Not selected, empty */
.tile.rev-empty { opacity:.18; }

.locked  { pointer-events:none; }
.dimming { opacity:0.15; transition:opacity 0.18s ease; }
.tile-num { font-family:'DM Mono',monospace; font-size:17px; font-weight:700; color:var(--muted); }
.tile.selected .tile-num { color:var(--sel-bdr); }
.tile-ico { line-height:1; display:inline-block; }
.gold-ico  { font-size:38px; }
.silver-ico{ font-size:26px; }

/* ── Result bar ── */
.result-bar {
  background:var(--surface); border:1px solid var(--border); border-radius:14px;
  padding:14px 20px; display:flex; align-items:center; justify-content:space-between;
  height:64px;
}
.result-left { display:flex; flex-direction:column; gap:3px; }
.result-sublbl { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted2); }
.result-outcome { font-size:18px; font-weight:700; line-height:1.2; }
.result-outcome .r-gold   { color:var(--gold); }
.result-outcome .r-white  { color:var(--text); }
.result-outcome .r-silver { color:var(--sil); }
.result-outcome .r-muted  { color:var(--muted2); }
.result-right { text-align:right; }
.result-mult-lbl { font-family:'DM Mono',monospace; font-size:12px; color:var(--muted2); }
.result-amount { font-family:'DM Mono',monospace; font-size:26px; font-weight:600; margin-top:3px; }
.result-amount.up   { color:#48bb78; }
.result-amount.down { color:#6b7280; }

@media(max-width:680px){ .layout{grid-template-columns:1fr;} .left{position:static;} }

/* Paytable toggle — mobile only */
.paytable-toggle { display: none; }

/* ── Mobile layout ── */
@media (max-width: 700px) {
  .layout {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 12px 12px max(env(safe-area-inset-bottom, 0px) + 100px, 120px);
    max-width: 100%;
  }
  /* Dissolve the two columns into a flat flow */
  .left, .right {
    display: contents;
    position: static;
  }
  /* All children fill full width */
  .left > *, .right > * {
    width: 100%;
    box-sizing: border-box;
  }
  /* Mobile paytable accordion */
  #box-paytable { display: none; }
  #box-paytable.open { display: block; }

  /* History: single row */
  #box-history .panel-label { margin-bottom: 0; white-space: nowrap; flex-shrink: 0; }
  #box-history .panel-box-inner,
  #box-history > div:not(.panel-label) { flex: 1; }
  #box-history { display: flex; align-items: center; gap: 10px; padding: 10px 14px; }
  #box-history .hist-strip {
    flex: 1;
    overflow-x: auto;
    flex-wrap: nowrap;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    min-width: 0;
  }
  #box-history .hist-strip::-webkit-scrollbar { display: none; }

  /* Assign order to every direct child */
  .game-header    { order: 10; }
  #box-balance    { order: 20; }
  #box-history    { order: 30; }
  .board          { order: 40; }
  .result-bar     { order: 50; }
  .board-topbar   { order: 55; }
  /* Show paytable toggle, hide pick counter */
  .pick-counter   { display: none; }
  .paytable-toggle {
    display: inline-flex; align-items: center; gap: 6px;
    background: none; border: none; color: var(--muted2);
    font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500;
    cursor: pointer; padding: 0; letter-spacing: 0.03em;
  }
  .paytable-toggle:hover { color: var(--text); }
  .pt-chevron {
    display: inline-block;
    width: 10px; height: 10px;
    border-right: 2px solid var(--text);
    border-bottom: 2px solid var(--text);
    transform: rotate(45deg);
    margin-bottom: 4px;
    transition: transform 0.2s ease;
  }
  .paytable-toggle.open .pt-chevron {
    transform: rotate(225deg);
    margin-bottom: -2px;
  }
  .btn-play       { order: 60; }
  .btn-row        { order: 70; }
  #autoBetsWrap   { order: 80; }
  #box-betamt     { order: 90; }
  #box-paytable   { order: 59; }
  #box-mode       { order: 110; }

/* ── Mobile tile image fixes ── */
@media (max-width: 700px) {
  /* Smaller gold bar on mobile only */
  .tile.selected.result-gold img,
  .tile.rev-gold img { width: 48px !important; height: 48px !important; }
}
</style>
</head>
<body>
<div class="layout">

  <!-- ── Left: controls ── -->
  <div class="left">
    <div class="game-header">
      <div class="game-title">BARS<em>.</em></div>
      <div class="pf-tag"><div class="pf-dot"></div>Probably Fair</div>
    </div>

    <!-- balance -->
    <div class="panel-box" id="box-balance">
      <div class="bal-row">
        <span class="bal-lbl">Balance</span>
        <span class="bal-val" id="balEl">$1,000.00</span>
      </div>
    </div>

    <!-- manual/auto toggle -->
    <div class="panel-box" id="box-mode" style="padding:4px;">
      <div class="mode-toggle">
        <button class="mode-btn active" id="modeManual">Manual</button>
        <button class="mode-btn" id="modeAuto">Auto</button>
      </div>
    </div>

    <!-- bet amount -->
    <div class="panel-box" id="box-betamt">
      <div class="panel-label">Bet Amount</div>
      <div class="bet-row">
        <button class="bet-adj" id="halfBtn">1/2</button>
        <input class="bet-field" type="number" id="betEl" value="1.00" min="0.10" step="0.10">
        <button class="bet-adj" id="dblBtn">2×</button>
      </div>
      <div class="bet-presets">
        <button class="preset-btn" data-v="1">$1</button>
        <button class="preset-btn" data-v="5">$5</button>
        <button class="preset-btn" data-v="10">$10</button>
        <button class="preset-btn" data-v="100">$100</button>
      </div>
    </div>

    <!-- number of bets (auto only) -->
    <div class="panel-box" id="autoBetsWrap">
      <div class="panel-label">Number of Bets</div>
      <div class="bet-row">
        <button class="bet-adj" id="betsHalf">1/2</button>
        <input class="bet-field" type="text" id="betsEl" value="∞" style="font-size:18px;">
        <button class="bet-adj" id="betsDouble">2×</button>
      </div>
      <div class="bet-presets">
        <button class="preset-btn" data-b="50">50</button>
        <button class="preset-btn" data-b="100">100</button>
        <button class="preset-btn" data-b="500">500</button>
        <button class="preset-btn" data-b="1000">1000</button>
      </div>
    </div>

    <!-- bet button -->
    <button class="btn-play" id="playBtn" disabled>Bet</button>
    <div class="btn-row">
      <button class="btn-secondary" id="randomBtn">Random Pick</button>
      <button class="btn-secondary" id="clearBtn">Clear Table</button>
    </div>

    <div class="panel-box" id="box-paytable" style="min-height:120px">
      <div class="panel-label">Paytable</div>
      <div id="ptWrap"><span class="pt-empty">No bars picked yet</span></div>
    </div>
  </div>

  <!-- ── Right: board + result ── -->
  <div class="right">
    <div class="board-topbar">
      <div class="pick-counter"><strong id="selCount">0</strong><span style="color:var(--muted)"> / 5 selected</span></div>
      <button class="paytable-toggle" id="paytableToggle"><span>Paytable</span><span class="pt-chevron"></span></button>
      <div class="turbo-wrap" id="turboWrap">
        <span class="turbo-label">⚡ Turbo</span>
        <div class="turbo-track" id="turboTrack"><div class="turbo-thumb"></div></div>
      </div>
    </div>

    <div class="board" id="board"></div>

    <div class="result-bar">
      <div class="result-left">
        <div class="result-sublbl" id="resultSub"></div>
        <div class="result-outcome" id="resultOut"><span class="r-muted" style="font-size:14px;font-weight:400">Pick 1–5 bars to play</span></div>
      </div>
      <div class="result-right" id="resultRight" style="display:none">
        <div class="result-mult-lbl" id="resultMult"></div>
        <div class="result-amount" id="resultAmt"></div>
      </div>
    </div>

    <div class="panel-box" id="box-history">
      <div class="panel-label">History</div>
      <div class="hist-strip" id="histEl"><span class="hist-empty">No rounds played yet</span></div>
    </div>

  </div>

function comb(n,k){if(k<0||k>n)return 0;if(k===0||k===n)return 1;let r=1;for(let i=0;i<k;i++)r=r*(n-i)/(i+1);return Math.round(r);}
function prob(n,g,s){const m=n-g-s;if(m<0||m>15)return 0;return comb(1,g)*comb(4,s)*comb(15,m)/comb(20,n);}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

// ── Tile helpers ──────────────────────────────────────────────────────────────
function applyReveal(el, idx) {
  const type = boardTypes[idx];
  const isPick = selected.has(idx);
  el.classList.remove('result-gold','result-silver','result-miss','rev-gold','rev-silver','rev-empty');

  if (isPick) {
    if (type==='gold') {
      el.classList.add('result-gold');
      el.innerHTML='<img src="'+GOLD_IMG+'" width=\"80\" height=\"80\" style=\"display:block\">';
      if(!turbo) el.animate([{transform:'scale(1)'},{transform:'scale(1.22)'},{transform:'scale(0.93)'},{transform:'scale(1)'}],{duration:420,easing:'ease-out'});
    } else if(type==='silver') {
      el.classList.add('result-silver');
      el.innerHTML='<img src="'+SIL_IMG+'" width=\"54\" height=\"54\" style=\"display:block\">';
      if(!turbo) el.animate([{transform:'scale(1)'},{transform:'scale(1.22)'},{transform:'scale(0.93)'},{transform:'scale(1)'}],{duration:420,easing:'ease-out'});
    } else {
      el.classList.add('result-miss');
      el.innerHTML=`<span class="tile-num">${idx+1}</span>`;
    }
  } else {
    if (type==='gold') {
      el.classList.add('rev-gold');
    el.innerHTML='<img src="'+GOLD_IMG+'" width=\"80\" height=\"80\" style=\"opacity:0.55;display:block\">';
      setTimeout(() => el.animate([{transform:'scale(1)'},{transform:'scale(1.22)'},{transform:'scale(0.94)'},{transform:'scale(1)'}],{duration:400,easing:'ease-out'}), 180);
    } else if(type==='silver') {
      el.classList.add('rev-silver');
    el.innerHTML='<img src="'+SIL_IMG+'" width=\"54\" height=\"54\" style=\"opacity:0.5;display:block\">';
      setTimeout(() => el.animate([{transform:'scale(1)'},{transform:'scale(1.22)'},{transform:'scale(0.94)'},{transform:'scale(1)'}],{duration:400,easing:'ease-out'}), 180);
    } else {
      el.classList.add('rev-empty');
      el.innerHTML=`<span class="tile-num">${idx+1}</span>`;
    }
  }
}

// ── Board render (idle only) ──────────────────────────────────────────────────
function renderBoard() {
  boardEl.innerHTML = '';
  for (let i=0; i<20; i++) {
    const t = document.createElement('div');
    t.className = 'tile' + (selected.has(i) ? ' selected' : '');
    t.dataset.idx = i;
    t.innerHTML = `<span class="tile-num">${i+1}</span>`;
    t.addEventListener('click', () => onTile(i));
    boardEl.appendChild(t);
  }
  selCountEl.textContent = selected.size;
}

function onTile(i) {
  if (phase==='revealing') return;
  if (phase==='done') {
    phase='idle';
    setDefaultResult();
    renderBoard(); renderPT(); updateSide();
    return;
  }
  if (selected.has(i)) { selected.delete(i); }
  else { if(selected.size>=5){ const a=[...selected]; selected.delete(a[a.length-1]); } selected.add(i); }
  renderBoard(); renderPT(); updateSide();
}

// ── Play ──────────────────────────────────────────────────────────────────────
function resetBoard() {
  // Wipe all result state, restore tiles to idle selection appearance
  boardEl.querySelectorAll('.tile').forEach(el => {
    const idx = parseInt(el.dataset.idx);
    el.classList.remove('result-gold','result-silver','result-miss','rev-gold','rev-silver','rev-empty','win-pop');
    el.innerHTML = `<span class="tile-num">${idx+1}</span>`;
  });
  resultRight.style.display = 'none';
  resultSub.textContent = '';
  resultOut.innerHTML = '<span class="r-muted">...</span>';
}

function play() { playSingle(null); }
function playSingle(onDone) {
  if (phase==='revealing' || selected.size===0) return;
  const bet = getBet(); if (bet>balance) return;
  balance -= bet; updateBal();

  boardTypes = shuffle(['gold','silver','silver','silver','silver',...Array(15).fill('empty')]);
  let g=0, s=0;
  selected.forEach(i => { if(boardTypes[i]==='gold') g++; else if(boardTypes[i]==='silver') s++; });
  const n=selected.size, key=`${g},${s}`, mult=PAYOUTS[n][key]??0;
  const win=+(bet*mult).toFixed(2), profit=+(win-bet).toFixed(2);

  phase='revealing';
  if (!autoRunning) playBtn.disabled=true;
  resetBoard();

  const tiles = boardEl.querySelectorAll('.tile');
  tiles.forEach(t => { t.classList.add('locked'); if(!selected.has(parseInt(t.dataset.idx))) t.classList.add('dimming'); });

  // Wait for dim transition, then reveal sequentially
  const DIM_WAIT    = 200;
  const PICK_DELAY  = 100;
  const OTHER_DELAY = 22;

  const picks  = [...selected];
  const others = shuffle([...Array(20).keys()].filter(i => !selected.has(i)));

  function settle() {
    balance+=win; updateBal();
    history.unshift(mult); if(history.length>10) history.pop();
    phase='done';
    if (!autoRunning) playBtn.disabled = selected.size===0;
    boardEl.querySelectorAll('.tile').forEach(t=>{ t.classList.remove('locked'); t.classList.remove('dimming'); });
    showResult(g,s,mult,profit,n,bet);
    renderPT(g,s);
    renderHist();
    if (onDone) setTimeout(onDone, turbo ? 300 : 1000);
  }

  if (turbo) {
    // Reveal all instantly, settle synchronously
    for (let i=0; i<20; i++) {
      const el = boardEl.querySelector(`[data-idx="${i}"]`);
      if (el) applyReveal(el, i);
    }
    settle();
  } else {
    const DIM_WAIT = 200, PICK_DELAY = 100, OTHER_DELAY = 22;
    boardEl.querySelectorAll('.tile').forEach(t => {
      if (!selected.has(parseInt(t.dataset.idx))) t.classList.add('dimming');
    });
    picks.forEach((idx, i) => {
      setTimeout(() => {
        const el = boardEl.querySelector(`[data-idx="${idx}"]`);
        if (el) { el.classList.remove('dimming'); applyReveal(el, idx); }
      }, DIM_WAIT + i * PICK_DELAY);
    });
    const otherStart = DIM_WAIT + picks.length * PICK_DELAY + 60;
    others.forEach((idx, i) => {
      setTimeout(() => {
        const el = boardEl.querySelector(`[data-idx="${idx}"]`);
        if (el) { el.classList.remove('dimming'); applyReveal(el, idx); }
      }, otherStart + i * OTHER_DELAY);
    });
    setTimeout(settle, otherStart + others.length * OTHER_DELAY + 80);
  }
}

// ── Result bar ────────────────────────────────────────────────────────────────
function setDefaultResult() {
  if (selected.size === 0 && phase !== 'done') {
    resultSub.textContent = '';
    resultOut.innerHTML = '<span class="r-muted" style="font-size:14px;font-weight:400">Pick 1–5 bars to play</span>';
    resultRight.style.display = 'none';
  } else if (phase !== 'done') {
    resultSub.textContent = '';
    resultOut.innerHTML = '<span class="r-muted">...</span>';
    resultRight.style.display = 'none';
  }
}

function showResult(g, s, mult, profit, n, bet) {
  resultSub.textContent = `Pick ${n}`;
  resultRight.style.display = 'block';
  resultMult.textContent = profit >= 0 ? `+$${profit.toFixed(2)}` : `-$${Math.abs(profit).toFixed(2)}`;
  resultAmt.textContent  = `${mult}×`;
  resultAmt.className    = 'result-amount ' + (mult > 1 ? 'up' : 'down');

  // Build colored outcome HTML
  let html = '';
  if (mult === 0) {
    html = '<span class="r-muted">No hit</span>';
  } else {
    const parts = [];
    if (g) parts.push(`<span class="r-gold">Gold</span>`);
    if (g && s) parts.push(`<span class="r-white"> + </span>`);
    if (s === 1) parts.push(`<span class="r-gold">1</span> <span class="r-silver">Silver</span>`);
    if (s > 1)  parts.push(`<span class="r-gold">${s}</span> <span class="r-silver">Silvers</span>`);
    html = parts.join('');
  }
  resultOut.innerHTML = html;
}

// ── Paytable ──────────────────────────────────────────────────────────────────
function renderPT(hitG, hitS) {
  if (selected.size === 0) {
    ptWrap.innerHTML = '<span class="pt-empty">No bars picked yet</span>';
    return;
  }
  const n = selected.size;
  const entries = Object.entries(PAYOUTS[n])
    .map(([key,mult])=>{ const[g,s]=key.split(',').map(Number); return{g,s,mult,pr:prob(n,g,s)}; })
    .filter(e=>n-e.g-e.s>=0&&n-e.g-e.s<=15)
    .sort((a,b)=>b.mult-a.mult);

  let html = `<div class="pt-head-row"><span>Result</span><span>Prob</span><span>Payout</span></div>`;
  entries.forEach(({g,s,mult,pr})=>{
    const isHL = hitG!==undefined && g===hitG && s===hitS;
    let hits='';
    if(g===0&&s===0) hits='<span style="color:var(--muted)">No hit</span>';
        if(g) hits+=`<img src="${GOLD_IMG}" width="18" height="18" style="vertical-align:middle">`; for(let i=0;i<s;i++) hits+=`<img src="${SIL_IMG}" width="15" height="15" style="vertical-align:middle;margin-left:2px">`;
    html+=`<div class="pt-row${isHL?' hl':''}">
      <div class="pt-hits">${hits}</div>
      <div class="pt-prob">${(pr*100).toFixed(4)}%</div>
      <div class="pt-mult${mult===0?' zero':''}">${mult>0?mult+'×':'—'}</div>
    </div>`;
  });
  ptWrap.innerHTML = html;
}

// ── Sidebar helpers ───────────────────────────────────────────────────────────
function getBet() { return Math.max(0.10, parseFloat(betEl.value)||1); }
function updateBal() { balEl.textContent='$'+balance.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function updateSide() { if(!autoRunning) playBtn.disabled = selected.size===0 || phase==='revealing'; }

function renderHist() {
  if (!history.length) { histEl.innerHTML='<span class="hist-empty">No rounds played yet</span>'; return; }
  histEl.innerHTML='';
  history.forEach(mult=>{
    const c=document.createElement('span');
    c.className='hist-chip '+(mult>1?'win':'loss');
    c.textContent=mult+'×';
    histEl.appendChild(c);
  });
}

// ── Events ────────────────────────────────────────────────────────────────────
document.getElementById('halfBtn').onclick=()=>{ betEl.value=Math.max(0.10,getBet()/2).toFixed(2); };
document.getElementById('dblBtn').onclick =()=>{ betEl.value=Math.min(balance,getBet()*2).toFixed(2); };
document.querySelectorAll('[data-v]').forEach(b=>b.addEventListener('click',()=>{ betEl.value=parseFloat(b.dataset.v).toFixed(2); }));

document.getElementById('clearBtn').onclick=()=>{
  if(phase==='revealing') return;
  if(phase==='done') phase='idle';
  selected.clear(); renderBoard(); renderPT(); updateSide(); setDefaultResult();
};
document.getElementById('randomBtn').onclick=()=>{
  if(phase==='revealing') return;
  if(phase==='done'){ phase='idle'; setDefaultResult(); }
  selected.clear();
  shuffle([...Array(20).keys()]).slice(0,5).forEach(i=>selected.add(i));
  renderBoard(); renderPT(); updateSide(); setDefaultResult();
};
playBtn.onclick=play;

// ── Manual / Auto toggle ──────────────────────────────────────────────────
const modeManual   = document.getElementById('modeManual');
const modeAuto     = document.getElementById('modeAuto');
const autoBetsWrap = document.getElementById('autoBetsWrap');
const betsEl       = document.getElementById('betsEl');

let autoMode = false;
let autoRunning = false;
let autoRemaining = Infinity; // Infinity = ∞

function isInfBets() { return betsEl.value.trim() === '∞' || betsEl.value.trim() === ''; }
function getAutoCount() { return isInfBets() ? Infinity : Math.max(1, parseInt(betsEl.value)||1); }

function setAutoBtn(state) {
  // state: 'start' | 'running' | 'resume'
  if (state === 'running') {
    playBtn.textContent = 'Stop';
    playBtn.style.background = '#e53e3e';
    playBtn.style.boxShadow = '0 4px 20px rgba(229,62,62,0.35)';
  } else {
    playBtn.textContent = 'Start';
    playBtn.style.background = '';
    playBtn.style.boxShadow = '';
  }
}

function updateBetsDisplay() {
  if (autoRemaining === Infinity) betsEl.value = '∞';
  else betsEl.value = autoRemaining;
}

modeManual.addEventListener('click', () => {
  if (autoRunning) stopAuto();
  autoMode = false;
  modeManual.classList.add('active');
  modeAuto.classList.remove('active');
  autoBetsWrap.classList.remove('show');
  playBtn.textContent = 'Bet';
  playBtn.style.background = '';
  playBtn.style.boxShadow = '';
});
modeAuto.addEventListener('click', () => {
  autoMode = true;
  modeAuto.classList.add('active');
  modeManual.classList.remove('active');
  autoBetsWrap.classList.add('show');
  playBtn.textContent = 'Start';
  playBtn.style.background = '';
  playBtn.style.boxShadow = '';
});

// Bets ½ / 2×
document.getElementById('betsHalf').addEventListener('click', () => {
  if (autoRunning) return;
  const v = parseInt(betsEl.value);
  betsEl.value = (!isNaN(v) && v > 1) ? Math.max(1, Math.floor(v/2)) : '∞';
});
document.getElementById('betsDouble').addEventListener('click', () => {
  if (autoRunning) return;
  const v = parseInt(betsEl.value);
  betsEl.value = !isNaN(v) ? Math.min(9999, v*2) : 100;
});
document.querySelectorAll('[data-b]').forEach(b =>
  b.addEventListener('click', () => { if(!autoRunning) betsEl.value = b.dataset.b; })
);

// ── Auto engine ────────────────────────────────────────────────────────────
function stopAuto(exhausted) {
  autoRunning = false;
  if (!exhausted) {
    // User stopped — preserve remaining, offer resume
    setAutoBtn('resume');
  } else {
    // Finished all bets — reset
    autoRemaining = Infinity;
    betsEl.value = '∞';
    setAutoBtn('start');
  }
}

function runAutoLoop() {
  if (!autoRunning) return;
  if (getBet() > balance) { stopAuto(false); return; }
  if (autoRemaining <= 0) { stopAuto(true); return; }

  // Decrement before play so it's visible
  if (autoRemaining !== Infinity) {
    autoRemaining--;
    updateBetsDisplay();
  }

  // Hijack phase flow: after settle we call runAutoLoop again
  playSingle(runAutoLoop);
}

// Override playBtn for auto mode
// Paytable accordion toggle (mobile)
const paytableToggle = document.getElementById('paytableToggle');
if (paytableToggle) {
  paytableToggle.addEventListener('click', () => {
    paytableToggle.classList.toggle('open');
    document.getElementById('box-paytable').classList.toggle('open');
  });
}

playBtn.onclick = () => {
  if (!autoMode) { play(); return; }

  if (autoRunning) {
    // Stop
    stopAuto(false);
    return;
  }

  // Start / Resume
  if (playBtn.textContent === 'Start') {
    autoRemaining = getAutoCount();
  }
  // Resume keeps autoRemaining as-is
  autoRunning = true;
  setAutoBtn('running');
  if (selected.size === 0) {
    // auto-random-pick if nothing selected
    shuffle([...Array(20).keys()]).slice(0,5).forEach(i=>selected.add(i));
    renderBoard(); renderPT(); updateSide();
  }
  runAutoLoop();
};

document.getElementById('turboWrap').addEventListener('click', () => {
  turbo = !turbo;
  document.getElementById('turboTrack').classList.toggle('on', turbo);
});

// ── Init ──────────────────────────────────────────────────────────────────────
renderBoard(); renderPT(); setDefaultResult(); updateSide(); updateBal();
</script>
</body>
</html>
